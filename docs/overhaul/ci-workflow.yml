# NOTE: move this file to .github/workflows/ci.yml to activate CI.
# (It was pushed here because the GitHub integration token lacks the
#  'workflows' permission required to write into .github/workflows/.)

name: CI

# Build + test gate for the whole solution (backend + frontend bundle).
# Added by the overhaul (docs/overhaul/12 P0, docs/overhaul/13). Blocks merges on failure.

on:
  push:
    branches: [master, overhaul]
  pull_request:
    branches: [master, overhaul]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Harbora.slnx

      - name: Build (Release, warnings as errors for changed code)
        run: dotnet build Harbora.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/Harbora.Tests/Harbora.Tests.csproj -c Release --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Harbora.Web/package-lock.json

      - name: Install
        working-directory: src/Harbora.Web
        run: npm ci

      - name: Build Vue islands bundle (must succeed)
        working-directory: src/Harbora.Web
        run: npm run build
